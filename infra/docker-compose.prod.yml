# Open Hoops — Production Docker Compose Override
# Use: docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# This override:
# - Removes host-exposed ports except 3000 and 8000 (web-facing)
# - Enables read-only filesystems where possible
# - Removes development volumes
# - Forces explicit POSTGRES_PASSWORD and MINIO credentials (no defaults)
# - Sets production-appropriate resource limits

services:
  postgres:
    ports: []  # Do not expose PostgreSQL to host in production
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    ports: []  # Do not expose Redis to host in production

  minio:
    ports:
      - "9000:9000"  # Keep S3 API accessible
      # Remove MinIO Console in production: - "9001:9001"

  ollama:
    deploy:
      resources:
        limits:
          memory: 28g  # Maximize for production LLM use

  api:
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          memory: 2g

  cv_worker:
    environment:
      YOLO_MODEL: ${YOLO_MODEL:-yolov8m.pt}  # Use medium model in production
    deploy:
      resources:
        limits:
          memory: 12g

  analytics_worker:
    deploy:
      resources:
        limits:
          memory: 4g
