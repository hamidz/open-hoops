version: "3.9"

# Open Hoops — Local Development Stack
# Run: docker compose -f infra/docker-compose.yml up -d
# GPU (AMD ROCm): docker compose -f infra/docker-compose.yml -f infra/docker-compose.gpu.yml up -d
#
# IMPORTANT (Windows users): Clone this repo inside WSL2's Linux filesystem,
# not on the Windows filesystem (/mnt/c/...), to avoid volume performance issues.

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    name: open_hoops_postgres_data
  redis_data:
    name: open_hoops_redis_data
  minio_data:
    name: open_hoops_minio_data
  ollama_data:
    name: open_hoops_ollama_data

# ─────────────────────────────────────────────
# Infrastructure Services
# ─────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openhoops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-openhoops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openhoops} -d ${POSTGRES_DB:-openhoops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (http://localhost:9001)
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/videos;
        mc mb --ignore-existing local/telemetry;
        mc mb --ignore-existing local/artifacts;
        echo 'MinIO buckets initialized.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: on-failure

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 24g
    # GPU support is configured in docker-compose.gpu.yml

# ─────────────────────────────────────────────
# Application Services
# ─────────────────────────────────────────────

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openhoops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openhoops}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-4294967296}
      SIGNED_URL_EXPIRY_FRAME_MINUTES: ${SIGNED_URL_EXPIRY_FRAME_MINUTES:-30}
      SIGNED_URL_EXPIRY_TELEMETRY_HOURS: ${SIGNED_URL_EXPIRY_TELEMETRY_HOURS:-24}
      SIGNED_URL_EXPIRY_ARTIFACT_HOURS: ${SIGNED_URL_EXPIRY_ARTIFACT_HOURS:-1}
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

  cv_worker:
    build:
      context: ../services/cv_worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openhoops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openhoops}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      YOLO_CONFIDENCE_THRESHOLD: ${YOLO_CONFIDENCE_THRESHOLD:-0.4}
      FRAME_SAMPLE_RATE: ${FRAME_SAMPLE_RATE:-3}
      CV_WORKER_CONCURRENCY: ${CV_WORKER_CONCURRENCY:-1}
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8g
    # GPU device configuration is in docker-compose.gpu.yml

  analytics_worker:
    build:
      context: ../services/analytics_worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openhoops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openhoops}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g

  llm_service:
    build:
      context: ../services/llm_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openhoops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openhoops}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-llama3.1:8b}
      LLM_REPORT_TIMEOUT_SECONDS: ${LLM_REPORT_TIMEOUT_SECONDS:-120}
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m
