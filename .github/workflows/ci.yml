name: CI

on:
  push:
    branches: [main, "phase/**", "fix/**", "docs/**", "chore/**", "copilot/**"]
  pull_request:
    branches: [main]

# Default minimal permissions for all jobs
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Python Lint
  # ─────────────────────────────────────────────
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: ruff check
        run: ruff check apps/api/ services/

      - name: ruff format check
        run: ruff format --check apps/api/ services/

      - name: mypy
        run: mypy apps/api/app/ services/cv_worker/pipeline/ services/analytics_worker/analytics/ services/llm_service/llm/

  # ─────────────────────────────────────────────
  # Frontend Lint
  # ─────────────────────────────────────────────
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --workspace web

      - name: TypeScript check
        run: npm exec --workspace web -- tsc --noEmit

  # ─────────────────────────────────────────────
  # Python Tests
  # ─────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-python
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API test dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Install CV worker test dependencies
        run: pip install -r services/cv_worker/requirements-dev.txt

      - name: Install analytics worker test dependencies
        run: pip install -r services/analytics_worker/requirements-dev.txt

      - name: Install LLM service test dependencies
        run: pip install -r services/llm_service/requirements-dev.txt

      - name: Run API tests
        run: pytest apps/api/tests/ -v --tb=short

      - name: Run CV Worker tests
        run: pytest services/cv_worker/tests/ -v --tb=short

      - name: Run Analytics Worker tests
        run: pytest services/analytics_worker/tests/ -v --tb=short

      - name: Run LLM Service tests
        run: pytest services/llm_service/tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Frontend Tests
  # ─────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-frontend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace web -- --run

  # ─────────────────────────────────────────────
  # TypeScript Type Sync Check (ADR-010, ADR-015)
  # ─────────────────────────────────────────────
  check-type-sync:
    name: TypeScript Type Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install type generation dependencies
        run: pip install -r packages/shared_types/requirements.txt

      - name: Generate TypeScript types
        run: python packages/shared_types/generate_types.py

      - name: Check for type drift
        run: |
          git diff --exit-code packages/shared_types/types/ || \
            (echo "ERROR: TypeScript types are out of sync. Run 'make generate-types' locally and commit the result." && exit 1)

  # ─────────────────────────────────────────────
  # Docker Compose Config Validation
  # ─────────────────────────────────────────────
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for config validation
        run: |
          echo "POSTGRES_PASSWORD=ci_validate_only" >> .env
          echo "MINIO_ROOT_USER=ci_user" >> .env
          echo "MINIO_ROOT_PASSWORD=ci_password_8chars" >> .env

      - name: Validate docker-compose.yml
        run: docker compose --env-file .env -f infra/docker-compose.yml config --quiet

      - name: Validate docker-compose.gpu.yml
        run: docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.gpu.yml config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.prod.yml config --quiet
